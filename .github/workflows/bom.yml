name: BOM Weather

on:
  push:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Fetch data
        run: curl -s "http://www.bom.gov.au/fwo/IDV60901/IDV60901.94857.json" > raw.json

      # DEBUG STEP (important)
      - name: Show raw data snippet
        run: head -n 20 raw.json

      - name: Extract Geelong Racecourse
        run: |
          mkdir -p data
          jq '.observations.data[] | select(.wmo==94857)' raw.json > data/latest.json

      # DEBUG: show what we extracted
      - name: Show extracted data
        run: cat data/latest.json

      - name: Update history
        run: |
          if [ -f data/history.json ]; then
            jq -s '.[0] + [.[1]]' data/history.json data/latest.json > tmp.json
            mv tmp.json data/history.json
          else
            jq -s '[.[0]]' data/latest.json > data/history.json
          fi

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add data/*.json
          git commit -m "update weather" || echo "no changes"
          git push
``
