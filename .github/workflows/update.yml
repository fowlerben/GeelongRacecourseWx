name: Update BOM Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch BOM data
        run: |
          curl -s "http://www.bom.gov.au/fwo/IDV60901/IDV60901.94802.json" > raw.json

      - name: Extract station
        run: |
          mkdir -p data
          jq '.observations.data[] | select(.wmo==94802)' raw.json > data/latest.json

      - name: Update history
        run: |
          if [ -f data/history.json ]; then
            jq -s 'unique_by(.local_date_time)' data/history.json data/latest.json > tmp.json
            mv tmp.json data/history.json
          else
            jq -s '[.[0]]' data/latest.json > data/history.json
          fi

          jq '.[-500:]' data/history.json > tmp.json && mv tmp.json data/history.json

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data/latest.json data/history.json
          git commit -m "Update data" || echo "No changes"
          git push
