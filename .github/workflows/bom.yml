name: BOM Weather

on:
  schedule:
    - cron: "*/10 * * * *"
  push:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch data
        run: curl -s "http://www.bom.gov.au/fwo/IDV60901/IDV60901.94857.json" > raw.json

      - name: Extract station
        run: |
          mkdir -p data
          jq '.observations.data[] | select(.wmo==94857)' raw.json > data/latest.json || echo "{}" > data/latest.json

      - name: Update history
        run: |
          if [ -s data/latest.json ]; then
            if [ -f data/history.json ]; then
              jq -s '.[0] + [.[1]]' data/history.json data/latest.json > tmp.json || cp data/history.json tmp.json
              mv tmp.json data/history.json
            else
              jq -s '[.[0]]' data/latest.json > data/history.json
            fi
          fi

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add data/*.json
          git commit -m "update weather" || echo "no changes"
          git push
