
<!DOCTYPE html>
<html>
<head>
  <title>Geelong Weather</title>
  https://cdn.jsdelivr.net/npm/chart.jsscript>
</head>
<body>

<h1>Geelong Racecourse Weather</h1>

<div id="weather">Loading...</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
async function load() {
  const current = await fetch('data/latest.json').then(r => r.json());
  const history = await fetch('data/history.json').then(r => r.json());

  document.getElementById('weather').innerHTML = `
    Temp: ${current.air_temp ?? '-'} °C <br>
    Humidity: ${current.rel_hum ?? '-'} % <br>
    Wind: ${current.wind_spd_kmh ?? '-'} km/h <br>
    Updated: ${current.local_date_time ?? '-'}
  `;

  const recent = history.slice(-50);

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: recent.map(d => d.local_date_time),
      datasets: [{
        label: 'Temperature °C',
        data: recent.map(d => d.air_temp)
      }]
    }
  });
}

load();
</script>

</body>
</html>
