<!DOCTYPE html>
<html>
<head>
  <title>Geelong Weather</title>
</head>
<body>

<h1>Geelong Racecourse Weather</h1>
<div id="weather">Loading...</div>

<script>
async function load() {
  const res = await fetch("https://api.allorigins.win/raw?url=http://www.bom.gov.au/fwo/IDV60901/IDV60901.94857.json");
  const raw = await res.json();

  const current = raw.observations.data.find(s => s.wmo == 94857);

  document.getElementById('weather').innerHTML = `
    Temp: ${current.air_temp} °C<br>
    Humidity: ${current.rel_hum}%<br>
    Wind: ${current.wind_spd_kmh} km/h<br>
    Updated: ${current.local_date_time}
  `;
}

load();
</script>

</body>
</html>
``
